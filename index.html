<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Solflare: Stronghold of the Free</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container"></div>
  <input id="hiddenInput" type="text" autocomplete="off" />

  <div id="startScreen">
    <img id="titleImage" src="assets/solflare_title.png" alt="Solflare" />
    <p id="subtitle">Stronghold v2 • Defenda seu portao com precisao, ritmo e controle total da digitacao.</p>
    <ul id="featureList">
      <li>Target lock inteligente para palavra sem ambiguidade</li>
      <li>Escalonamento progressivo por wave, combo e precisao</li>
      <li>Suporte de teclado desktop e input oculto no mobile</li>
    </ul>
    <p id="startHint">Press SPACE or click Start</p>
    <button id="startButton">Start</button>
  </div>

  <button id="restartButton">Restart</button>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script src="word_bank.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
